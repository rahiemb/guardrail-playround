[build-system]
requires = ["setuptools==68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "guardrail-engine"
version = "0.1.0"
description = "Guardrail validation engine for LLM applications"
requires-python = "==3.14.*"
dependencies = [
    "fastapi==0.135.3",
    "uvicorn[standard]==0.44.0",
    "pydantic==2.12.5",
    "python-dotenv==1.0.1",
    "litellm==1.83.4",
    "aiohttp==3.13.5",
]

[project.optional-dependencies]
dev = [
    "pytest==8.3.4",
    "pytest-asyncio==0.25.0",
    "httpx==0.28.1",
    "ruff==0.15.9",
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
